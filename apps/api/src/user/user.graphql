enum UserRole {
  CUSTOMER
  ADMIN
  STAFF
}

type User {
  id: String!
  firstName: String!
  lastName: String!
  email: String!
  phone: String!
  role: UserRole!
  verified: Boolean!
  createdAt: String!
  updatedAt: String!
}

input CreateUserInput {
  firstName: String!
  lastName: String!
  email: String!
  phone: String!
  password: String!
  role: UserRole
}

input UpdateUserInput {
  userId: String!
  firstName: String
  lastName: String
  email: String
  phone: String
  password: String
  role: UserRole
}

extend type Query {
  users: [User!]!
  user(id: String!): User
}

extend type Mutation {
  createUser(input: CreateUserInput!): User!
  updateUser(input: UpdateUserInput!): User!
  deleteUser(id: String!): Boolean
}
